version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Tokyo"
    labels:
      - "dependencies"
    open-pull-requests-limit: 10
    groups:
      next:
        patterns:
          - "next"
          - "next-*"
          - "@next/*"
          - "eslint-config-next"
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"
      trpc:
        patterns:
          - "@trpc/*"
      supabase:
        patterns:
          - "@supabase/*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "next"
          - "next-*"
          - "@next/*"
          - "prisma"
          - "@prisma/*"
          - "@trpc/*"
          - "@supabase/*"
          - "tailwindcss"
          - "@tailwindcss/*"
          - "react"
          - "react-dom"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Tokyo"
    labels:
      - "dependencies"
      - "github-actions"
